name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1). Empty uses the current ref name."
        required: false
        type: string

permissions:
  contents: write

jobs:
  resolve-meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Tag could not be resolved." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-assets:
    needs: resolve-meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: x86_64-unknown-linux-gnu
            binary_name: cols
          - os: macos-13
            platform: x86_64-apple-darwin
            binary_name: cols
          - os: windows-latest
            platform: x86_64-pc-windows-msvc
            binary_name: cols.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --bin cols

      - name: Package distribution files
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ needs.resolve-meta.outputs.version }}'
          RELEASE_DIR="cols-${TAG}-${{ matrix.platform }}"
          mkdir -p "dist/${RELEASE_DIR}"
          cp LICENSE README.md "target/release/${{ matrix.binary_name }}" "dist/${RELEASE_DIR}/"
          tar -czf "dist/${RELEASE_DIR}.tar.gz" -C dist "${RELEASE_DIR}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: dist/*.tar.gz

  create-release:
    runs-on: ubuntu-latest
    needs:
      - resolve-meta
      - build-assets
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: dist
          merge-multiple: true

      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-meta.outputs.tag }}
          name: Release ${{ needs.resolve-meta.outputs.tag }}
          draft: true
          prerelease: false
          target_commitish: ${{ github.sha }}
          files: dist/*.tar.gz
