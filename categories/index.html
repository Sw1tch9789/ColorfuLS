<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Categories | ColorfuLS</title>
  <meta name="description" content="ColorfuLS documentation">
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-alt: #eef2ff;
      --text: #0f172a;
      --muted: #475569;
      --border: #cbd5e1;
      --accent: #1d4ed8;
      --accent-soft: #dbeafe;
      --code-bg: #0f172a;
      --code-text: #e2e8f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, var(--bg), #eef2ff 100%);
      color: var(--text);
      line-height: 1.7;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .navlinks {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      font-size: 0.95rem;
    }

    .navlinks a {
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
    }

    .navlinks a:hover {
      background: var(--accent-soft);
      text-decoration: none;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 1.5rem;
    }

    aside, main, .hero, .card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    aside {
      padding: 1rem;
      align-self: start;
      position: sticky;
      top: 5rem;
    }

    aside h2 {
      margin-top: 0;
      font-size: 1rem;
    }

    aside ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.3rem;
    }

    aside a {
      display: block;
      padding: 0.4rem 0.6rem;
      border-radius: 10px;
      color: var(--text);
    }

    aside a:hover {
      background: var(--accent-soft);
      text-decoration: none;
    }

    main {
      padding: 1.5rem;
      min-width: 0;
    }

    .hero {
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #ffffff, #dbeafe);
    }

    .content :is(h1, h2, h3) { color: var(--text); }
    .content :is(pre, code) { font-family: ui-monospace, SFMono-Regular, SF Mono, Consolas, monospace; }
    .content pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 1rem;
      border-radius: 14px;
      overflow-x: auto;
    }
    .content code {
      background: #fef2f2;
      padding: 0.1rem 0.35rem;
      border-radius: 6px;
    }
    .content pre code { background: transparent; padding: 0; color: inherit; }
    .content table { width: 100%; border-collapse: collapse; }
    .content th, .content td { border: 1px solid var(--border); padding: 0.75rem; vertical-align: top; }
    .content th { background: var(--surface-alt); text-align: left; }

    footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem 2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      aside { position: static; }
    }
  </style>
</head>
<body>

      <a class="brand" href="/ColorfuLS/">ColorfuLS</a>

        <a href="/ColorfuLS/ja/docs/">Docs</a>
        <a href="/ColorfuLS/ja/docs/tutorial/">Tutorial</a>
        <a href="/ColorfuLS/ja/docs/examples/">Examples</a>
        <a href="/ColorfuLS/ja/docs/reference/">Reference</a>
      </nav>
    </div>
  </header>

  <div class="shell">
    <aside>

      <ul>

        <li><a href="/ColorfuLS/ja/docs/tutorial/">Tutorial</a></li>
        <li><a href="/ColorfuLS/ja/docs/examples/">Examples</a></li>
        <li><a href="/ColorfuLS/ja/docs/reference/">Reference</a></li>
      </ul>
    </aside>

    <main>
      
  <section class="hero">
    <h1>Categories</h1>
    <div class="content">
      
    </div>
  </section>

  <section class="card" style="padding: 1.25rem;">

    <ul>

  </section>

    </main>
  </div>

  <footer>

</body>
</html>
